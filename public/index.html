<!DOCTYPE html>
<html>
<head>
<title>Katalog Koleksi</title>
</head>

<body>

<h1>Katalog Koleksi</h1>

<div id="koleksi"></div>

<h3>Fortune</h3>
<div id="fortune"></div>

<script>

async function loadKoleksi(){

const res = await fetch('/api/get-koleksi')
const json = await res.json()

const div = document.getElementById('koleksi')

json.data.forEach(item=>{

div.innerHTML += `
<div onclick="detail('${item.id}')">
<img src="${item.path}" width="200">
<h3>${item.judul}</h3>
</div>
`

})

}

async function detail(id){

const res = await fetch(`/api/get-detail?id=${id}`)
const data = await res.json()

alert(`
Pencipta: ${data.pencipta}
Harga: ${data.harga}
Tahun: ${data.tahun}
`)

}

async function fortune(){

const res = await fetch('/api/fortune')
const json = await res.json()

document.getElementById("fortune").innerText = json.fortune

}

loadKoleksi()
fortune()

</script>

</body>
</html>
