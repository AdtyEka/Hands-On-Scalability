<!DOCTYPE html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0"
    />
    <title>Katalog Koleksi Seni</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>

  <body>
    <div class="page">
      <main class="page__inner">
        <header>
          <h1>Katalog Koleksi Seni</h1>
          <p>
            Jelajahi koleksi foto dan video pilihan. Klik judul atau gambar
            untuk melihat detail setiap karya.
          </p>
        </header>

        <section
          class="catalog-section"
          aria-labelledby="catalog-heading"
        >
          <div class="catalog-header">
            <h2
              id="catalog-heading"
              class="catalog-header__title"
            >
              Koleksi terkini
            </h2>
            <p class="catalog-header__meta" id="catalog-meta">
              <!-- Info jumlah item / status akan diisi via JS -->
            </p>
          </div>

          <!-- Pesan status global katalog (loading / error) -->
          <p
            class="status"
            id="catalog-status"
            aria-live="polite"
          ></p>

          <!-- Grid utama katalog -->
          <div
            class="catalog-grid"
            id="catalog-grid"
          >
            <!-- Kartu koleksi akan di-render via JavaScript -->
          </div>
        </section>
      </main>

      <footer>
        <div class="footer__inner">
          <div>
            <div class="footer__label">Hari ini kamu mendapatkan</div>
            <div
              class="footer__fortune"
              id="fortune-text"
              aria-live="polite"
            >
              <!-- Fortune message dari API -->
            </div>
          </div>
          <div class="footer__meta">
            Powered by koleksi internal · Data diambil secara dinamis dari API.
          </div>
        </div>
      </footer>
    </div>

    <script src="./main.js" defer></script>
  </body>
</html>
